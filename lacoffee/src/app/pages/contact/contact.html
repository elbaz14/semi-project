<div class="contact-page">
    <h1>Contact Us</h1>
    <p>We'd love to hear from you</p>

    @if (submitted) {
    <div class="success-message">
        <span class="success-icon">✅</span>
        <h2>Thank you, {{ name }}!</h2>
        <div [ngSwitch]="subject">
            <p *ngSwitchCase="'Reservation'">We'll confirm your reservation soon.</p>
            <p *ngSwitchCase="'Complaint'">We're sorry to hear that. We'll get back to you shortly.</p>
            <p *ngSwitchCase="'Catering'">Our catering team will contact you within 24 hours.</p>
            <p *ngSwitchDefault>We'll get back to you as soon as possible.</p>
        </div>
        <button class="reset-btn" (click)="resetForm()">Send Another Message</button>
    </div>
    } @else {
    <form #contactForm="ngForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" [(ngModel)]="name" required placeholder="Your name">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" [(ngModel)]="email" required placeholder="Your email">
        </div>
        <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" [(ngModel)]="phone" placeholder="Your phone number">
        </div>
        <div class="form-group">
            <label for="subject">Subject</label>
            <select id="subject" name="subject" [(ngModel)]="subject" required>
                <option value="" disabled>Select a subject</option>
                <option *ngFor="let s of subjects" [value]="s">{{ s }}</option>
            </select>
        </div>
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" [(ngModel)]="message" rows="5" required
                placeholder="Write your message here..."></textarea>
        </div>
        <button type="submit" class="submit-btn" [disabled]="!contactForm.valid">Send Message</button>
    </form>
    }
</div>
